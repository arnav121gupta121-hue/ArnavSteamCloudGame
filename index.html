<!DOCTYPE html><html>
<head><title>Arnav Steam Cloud Gaming</title><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f2027"><link rel="manifest" href="manifest.json"><style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
font-size:40px;
}

.server{
font-size:18px;
margin-bottom:20px;
}

.toggle-btn{
padding:10px 20px;
border:none;
border-radius:8px;
background:#444;
color:white;
cursor:pointer;
}

.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.game-card{
width:220px;
background:#111;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px #00ffcc;
transition:0.3s;
}

.game-card:hover{
transform:scale(1.07);
}

.game-card img{
width:100%;
height:260px;
object-fit:cover;
}

.game-card p{
padding:10px;
font-weight:bold;
}

.play-btn{
margin-top:40px;
padding:18px 50px;
font-size:22px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-weight:bold;
box-shadow:0 0 20px #00ff99;
cursor:pointer;
}

</style></head><body><h1>🎮 Arnav Steam Cloud Gaming</h1><p id="serverStatus" class="server">
Server Status: 🟢 Online
</p><button class="toggle-btn" onclick="toggleServer()">
Toggle Server
</button><h2>How To Play</h2><p>1. Install Steam Link from Playstore</p>
<p>2. Open Steam Link</p>
<p>3. Enter the connection code from Arnav</p>
<p>4. Connect to the PC</p>
<p>5. Start Playing</p><h2>Available Games</h2><div class="games"><div class="game-card">
<img src="forza.jpg">
<p>Forza Horizon 5</p>
</div><div class="game-card">
<img src="gtasa.jpg">
<p>GTA SA Definitive Edition</p>
</div><div class="game-card">
<img src="tekken7.jpg">
<p>Tekken 7</p>
</div><div class="game-card">
<img src="spiderman.jpg">
<p>Amazing Spider-Man</p>
</div></div><button class="play-btn" onclick="openSteamLink()">
START PLAYING
</button><script>

function openSteamLink(){
window.location.href="steamlink://";
}

let serverOnline = true;

function toggleServer(){

serverOnline = !serverOnline;

if(serverOnline){
document.getElementById("serverStatus").innerHTML =
"Server Status: 🟢 Online";
}else{
document.getElementById("serverStatus").innerHTML =
"Server Status: 🔴 Offline";
}

}

</script></body>
</html>
