<!DOCTYPE html>
<html>
<head>
<title>Arnav Steam Cloud Gaming</title>

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:30px;
font-size:42px;
}

.server{
font-size:20px;
color:#00ff88;
font-weight:bold;
}

.instructions{
margin-top:30px;
font-size:18px;
line-height:32px;
}

.games{
margin-top:40px;
}

.game-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:20px;
}

.game{
width:200px;
background:#111;
border-radius:10px;
padding:10px;
box-shadow:0 0 15px rgba(0,255,150,0.5);
}

.game img{
width:100%;
border-radius:10px;
}

.game p{
margin-top:8px;
font-weight:bold;
}

.play-btn{
margin-top:50px;
padding:22px 50px;
font-size:28px;
background:#00ff88;
color:black;
border:none;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 20px #00ff88;
transition:0.3s;
}

.play-btn:hover{
transform:scale(1.1);
box-shadow:0 0 35px #00ff88;
}

</style>

</head>

<body>

<h1>🎮 Arnav Steam Cloud Gaming</h1>

<p id="serverStatus" class="server">Server Status: 🟢 Online</p>

<button onclick="toggleServer()">Toggle Server</button>

<div class="instructions">

<h2>How To Play</h2>

<p>1. Install Steam Link from Playstore</p>
<p>2. Open Steam Link</p>
<p>3. Enter the connection code from Arnav</p>
<p>4. Connect to the PC</p>
<p>5. Start Playing</p>

</div>

<div class="games">

<h2>Available Games</h2>

<div class="game-container">

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5f/Forza_Horizon_5_cover_art.jpg">
<p>Forza Horizon 5</p>
</div>

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/4/44/GTA_San_Andreas_Definitive_Edition.jpg">
<p>GTA SA Definitive Edition</p>
</div>

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/4/44/Tekken_7_cover_art.jpg">
<p>Tekken 7</p>
</div>

<div class="game">
<img src="https://upload.wikimedia.org/wikipedia/en/0/02/The_Amazing_Spider-Man_video_game_cover.jpg">
<p>Amazing Spider-Man</p>
</div>

</div>

</div>

<button class="play-btn"
onclick="alert('Open Steam Link and connect to Arnav PC to start playing!')">
START PLAYING
</button>

</body>
</html>
