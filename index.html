<!DOCTYPE html>
<html>
<head>
<title>Arnav Steam Cloud Gaming</title>

<style>

body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}

h1{
margin-top:20px;
}

.server{
font-size:18px;
margin-bottom:20px;
}

.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.game{
background:#111;
padding:15px 25px;
border-radius:10px;
box-shadow:0 0 10px #00ffcc;
}

.play-btn{
margin-top:30px;
padding:18px 50px;
font-size:18px;
border:none;
border-radius:10px;
background:#00ff99;
color:black;
font-weight:bold;
box-shadow:0 0 20px #00ff99;
}

.toggle-btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#444;
color:white;
}

</style>
</head>

<body>

<h1>🎮 Arnav Steam Cloud Gaming</h1>

<p id="serverStatus" class="server">
Server Status: 🟢 Online
</p>

<button class="toggle-btn" onclick="toggleServer()">
Toggle Server
</button>

<h2>How To Play</h2>

<p>1. Install Steam Link from Playstore</p>
<p>2. Open Steam Link</p>
<p>3. Enter the connection code from Arnav</p>
<p>4. Connect to the PC</p>
<p>5. Start Playing</p>

<h2>Available Games</h2>

<div class="games">

<div class="game">
1
</div>

<div class="game">
2
</div>

<div class="game">
3
</div>

<div class="game">
4
</div>

</div>

<button class="play-btn" onclick="openSteamLink()">
START PLAYING
</button>

<script>

function openSteamLink(){
window.location.href="steamlink://";
}

let serverOnline = true;

function toggleServer(){

serverOnline = !serverOnline;

if(serverOnline){
document.getElementById("serverStatus").innerHTML =
"Server Status: 🟢 Online";
}else{
document.getElementById("serverStatus").innerHTML =
"Server Status: 🔴 Offline";
}

}

</script>

</body>
</html>
